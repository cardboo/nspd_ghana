<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seafarer Login - NSPD Ghana</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-header">
            <h1 class="sidebar-logo">NSPD GHANA</h1>
            <p style="color: var(--text-muted)">Seafarer Portal — Track your application</p>
        </div>
        <div class="alert alert-danger" id="loginError" style="display:none"></div>
        <form id="portalLoginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="you@example.com" required maxlength="150">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" required autocomplete="current-password">
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </div>
        </form>
        <div class="auth-links">
            New here? <a href="portal-register.html" class="link-primary">Create an account</a><br>
            <a href="login.html" class="link-primary">GMA staff login</a>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/portal-auth.js"></script>
</body>
</html>
