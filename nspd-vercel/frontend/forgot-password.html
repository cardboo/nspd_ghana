<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - NSPD Ghana</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-header">
            <h1 class="sidebar-logo">NSPD GHANA</h1>
            <p style="color: var(--text-muted)" id="realmSubtitle">Reset your password</p>
        </div>
        <div class="alert alert-danger" id="forgotError" style="display:none"></div>
        <div class="alert-info" id="forgotSuccess" style="display:none"></div>
        <form id="forgotForm">
            <div class="form-group">
                <label for="identifier" id="identifierLabel">Email address</label>
                <input type="text" id="identifier" class="form-control" required maxlength="150">
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
            </div>
        </form>
        <div class="auth-links">
            <a href="portal-login.html" id="backToLogin" class="link-primary">Back to sign in</a>
        </div>
    </div>
    <script src="js/recovery.js"></script>
</body>
</html>
