<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seafarer Registration - NSPD Ghana</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-header">
            <h1 class="sidebar-logo">NSPD GHANA</h1>
            <p style="color: var(--text-muted)">Seafarer Portal — Create your account</p>
        </div>
        <div class="alert alert-danger" id="registerError" style="display:none"></div>
        <div class="alert-info" id="registerSuccess" style="display:none"></div>
        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" class="form-control" placeholder="As it appears on your documents" required maxlength="150">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="you@example.com" required maxlength="150">
            </div>
            <div class="form-group">
                <label for="password">Password (min 8 characters)</label>
                <input type="password" id="password" class="form-control" minlength="8" required autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control" minlength="8" required autocomplete="new-password">
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
            </div>
        </form>
        <div class="auth-links">
            Already have an account? <a href="portal-login.html" class="link-primary">Sign in</a><br>
            <a href="login.html" class="link-primary">GMA staff login</a>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/portal-auth.js"></script>
</body>
</html>
