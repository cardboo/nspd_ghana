<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - NSPD Ghana</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-header">
            <h1 class="sidebar-logo">NSPD GHANA</h1>
            <p style="color: var(--text-muted)">Choose a new password</p>
        </div>
        <div class="alert alert-danger" id="resetError" style="display:none"></div>
        <div class="alert-info" id="resetSuccess" style="display:none"></div>
        <form id="resetForm">
            <div class="form-group">
                <label for="newPassword">New Password (min 8 characters)</label>
                <input type="password" id="newPassword" class="form-control" minlength="8" required autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input type="password" id="confirmPassword" class="form-control" minlength="8" required autocomplete="new-password">
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
            </div>
        </form>
        <div class="auth-links">
            <a href="portal-login.html" id="backToLogin" class="link-primary">Back to sign in</a>
        </div>
    </div>
    <script src="js/recovery.js"></script>
</body>
</html>
